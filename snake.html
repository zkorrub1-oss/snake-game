<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    color: #e0e0e0;
  }
  h1 { font-size: 2rem; letter-spacing: 6px; margin-bottom: 12px; color: #4ecca3; text-transform: uppercase; }
  #hud {
    display: flex; gap: 24px; margin-bottom: 10px;
    font-size: 0.85rem; letter-spacing: 2px; color: #a0a0c0;
    flex-wrap: wrap; justify-content: center;
  }
  #hud span { color: #4ecca3; font-weight: bold; }
  #hud .lives-icons { color: #e06c75; letter-spacing: 1px; }

  #game-row { display: flex; align-items: stretch; }
  .side-panel {
    width: 68px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 6px;
    border: 2px solid #2a2a4a; background: #0f0f1e; padding: 10px 6px;
  }
  .side-panel .panel-label { font-size: 0.6rem; letter-spacing: 2px; color: #555577; text-transform: uppercase; }
  .side-panel .panel-num  { font-size: 2rem; font-weight: bold; line-height: 1; }
  .side-panel .panel-sub  { font-size: 0.58rem; letter-spacing: 1px; color: #555577; text-align: center; }
  #panel-left  { border-right: none; border-radius: 6px 0 0 6px; }
  #panel-right { border-left:  none; border-radius: 0 6px 6px 0; }
  #panel-left  .panel-num { color: #4ecca3; }
  #panel-right .panel-num { color: #ffd700; }

  #canvas-wrap { position: relative; }
  canvas { display: block; border: 2px solid #4ecca3; box-shadow: 0 0 20px rgba(78,204,163,0.3); }

  .abs-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px; background: rgba(15,15,30,0.88);
  }
  .abs-overlay.hidden { display: none; }
  #overlay h2 { font-size: 1.6rem; letter-spacing: 4px; color: #e06c75; }
  #overlay p  { font-size: 0.82rem; letter-spacing: 2px; color: #a0a0c0; text-align:center; padding: 0 12px; }

  #powerup-banner {
    position: absolute; top: 8px; left: 0; right: 0;
    text-align: center; font-size: 0.8rem; letter-spacing: 2px;
    padding: 4px 8px; border-radius: 4px;
    pointer-events: none; transition: opacity 0.4s;
  }
  #powerup-banner.hidden { opacity: 0; }
  #level-flash {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem; letter-spacing: 6px; color: #ffd700;
    pointer-events: none; opacity: 0; transition: opacity 0.3s;
    text-shadow: 0 0 20px rgba(255,215,0,0.8);
  }

  /* ── Skill tree ─────────────────────────────────────────── */
  #skill-tree {
    position: absolute; inset: 0;
    background: rgba(8,8,20,0.97);
    display: flex; flex-direction: column;
    padding: 14px 16px; gap: 12px;
  }
  #skill-tree.hidden { display: none; }

  #st-topbar {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.75rem; letter-spacing: 2px;
    border-bottom: 1px solid #2a2a4a; padding-bottom: 10px;
  }
  #st-exp-rate  { color: #4ecca3; }
  #st-title     { color: #a0a0c0; font-size: 0.9rem; letter-spacing: 4px; }
  #st-fruits    { color: #ffd700; }

  #st-skills-grid { flex: 1; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }

  .skill-card {
    background: #12122a; border: 1px solid #2a2a4a; border-radius: 6px;
    padding: 10px 14px; display: flex; align-items: center; gap: 12px;
  }
  .skill-card.has-level { border-color: #4ecca370; }
  .skill-icon { font-size: 1.4rem; width: 28px; text-align: center; flex-shrink: 0; }
  .skill-info { flex: 1; }
  .skill-name { font-size: 0.78rem; letter-spacing: 2px; color: #e0e0e0; margin-bottom: 2px; }
  .skill-desc { font-size: 0.66rem; letter-spacing: 1px; color: #555577; }
  .skill-lvl  { font-size: 0.62rem; color: #4ecca3; margin-top: 3px; letter-spacing: 1px; }
  .skill-action { flex-shrink: 0; text-align: center; }

  .skill-btn {
    background: #1e1e3e; border: 1px solid #3a3a5a;
    color: #a0a0c0; font-family: 'Courier New', monospace;
    font-size: 0.68rem; letter-spacing: 1px; cursor: pointer;
    padding: 6px 10px; border-radius: 4px;
    line-height: 1.4; transition: background 0.12s, color 0.12s, border-color 0.12s;
  }
  .skill-btn:hover:not(:disabled) { background: #2e2e5e; color: #e0e0e0; border-color: #4ecca3; }
  .skill-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .skill-btn.owned { border-color: #4ecca3; color: #4ecca3; background: #0a2218; cursor: default; }
  .skill-cost { color: #ffd700; font-size: 0.62rem; }

  #st-footer { text-align: center; font-size: 0.66rem; letter-spacing: 2px; color: #2a2a4a; border-top: 1px solid #1a1a30; padding-top: 8px; }

  /* ── Reset confirm overlay ──────────────────────────────── */
  #reset-confirm {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; background: rgba(8,8,20,0.95);
  }
  #reset-confirm.hidden { display: none; }
  #reset-confirm h2 { font-size: 1.4rem; letter-spacing: 4px; color: #e06c75; }
  #reset-confirm p  { font-size: 0.8rem; letter-spacing: 2px; color: #a0a0c0; }
  #reset-confirm .btn-row { display: flex; gap: 16px; margin-top: 4px; }
  .confirm-btn {
    font-family: 'Courier New', monospace;
    font-size: 0.8rem; letter-spacing: 3px;
    padding: 8px 22px; border-radius: 4px; cursor: pointer;
    border: 1px solid; transition: background 0.12s, color 0.12s;
  }
  #btn-yes { background: #1e0a0a; border-color: #e06c75; color: #e06c75; }
  #btn-yes:hover { background: #e06c75; color: #0f0f1e; }
  #btn-no  { background: #0a1e14; border-color: #4ecca3; color: #4ecca3; }
  #btn-no:hover  { background: #4ecca3; color: #0f0f1e; }

  #controls { margin-top: 12px; font-size: 0.75rem; letter-spacing: 1px; color: #555577; }
</style>
</head>
<body>
<h1>Snake</h1>
<div id="hud">
  <span>LVL <span id="lvl">1</span></span>
  &nbsp;|&nbsp;
  SCORE: <span id="score">0</span>
  &nbsp;|&nbsp;
  BEST: <span id="best">0</span>
  &nbsp;|&nbsp;
  LIVES: <span id="lives" class="lives-icons">♥♥♥</span>
</div>

<div id="game-row">
  <div class="side-panel" id="panel-left">
    <div class="panel-label">exp</div>
    <div class="panel-num" id="eaten-num">0</div>
    <div class="panel-sub">this<br>level</div>
  </div>

  <div id="canvas-wrap">
    <canvas id="c"></canvas>
    <div id="powerup-banner" class="hidden"></div>
    <div id="level-flash"></div>
    <div id="overlay" class="abs-overlay">
      <h2 id="overlay-title">READY</h2>
      <p id="overlay-msg">PRESS SPACE OR ENTER TO START</p>
    </div>
    <div id="skill-tree" class="hidden">
      <div id="st-topbar">
        <span id="st-exp-rate">EXP/FRUIT: 1.0</span>
        <span id="st-title">SKILL TREE</span>
        <span id="st-fruits">FRUITS: 0</span>
      </div>
      <div id="st-skills-grid"></div>
      <div id="st-footer">E OR ESC TO CLOSE</div>
    </div>
    <div id="reset-confirm" class="hidden">
      <h2>RESET GAME?</h2>
      <p>All progress this run will be lost.</p>
      <div class="btn-row">
        <button class="confirm-btn" id="btn-yes">YES</button>
        <button class="confirm-btn" id="btn-no">NO</button>
      </div>
    </div>
  </div>

  <div class="side-panel" id="panel-right">
    <div class="panel-label">need</div>
    <div class="panel-num" id="need-num">5</div>
    <div class="panel-sub" id="panel-right-sub">to next<br>level</div>
  </div>
</div>

<div id="controls">WASD / ARROWS &nbsp;·&nbsp; SPACE = PAUSE &nbsp;·&nbsp; E = SKILL TREE</div>

<script>
const LEVEL_THRESHOLDS = [0, 5, 12, 21, 32, 45, 60, 77, 96, 117]; // EXP to reach each level
const BASE_SPEED  = 130;
const SPEED_STEP  = 10;
const POWERUP_POOL   = ['extra-life','extra-life','extra-life','extra-fruit','extra-fruit','extra-fruit','bigger-map'];
const POWERUP_CHANCE = 0.25;

const SKILL_DEFS = [
  {
    id: 'tongue',
    name: 'TONGUE',
    icon: '👅',
    desc: 'Collect fruit 1 cell ahead of the snake',
    cost: 20,
    maxLevel: 1,
  },
  {
    id: 'expBoost',
    name: '+0.1 EXP / FRUIT',
    icon: '✦',
    desc: 'Earn 0.1 more EXP per fruit (stackable)',
    cost: 5,
    maxLevel: 5,
  },
  {
    id: 'extraFruit',
    name: '+1 FRUIT',
    icon: '🍎',
    desc: 'Permanently add one more fruit to the map',
    cost: 10,
    maxLevel: 20,
    requires: { id: 'expBoost', level: 3 },
  },
  {
    id: 'slowDown',
    name: 'SERPENT PACE',
    icon: '🐢',
    desc: 'Decrease snake speed by 10% per level',
    cost: 5,
    maxLevel: 10,
    requires: { id: 'tongue', level: 1 },
  },
];

const canvas       = document.getElementById('c');
const ctx          = canvas.getContext('2d');
const scoreEl      = document.getElementById('score');
const bestEl       = document.getElementById('best');
const lvlEl        = document.getElementById('lvl');
const livesEl      = document.getElementById('lives');
const overlay      = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlay-title');
const overlayMsg   = document.getElementById('overlay-msg');
const puBanner     = document.getElementById('powerup-banner');
const lvlFlash     = document.getElementById('level-flash');
const eatenEl      = document.getElementById('eaten-num');
const needEl       = document.getElementById('need-num');
const panelRightSub= document.getElementById('panel-right-sub');
const skillTreeEl  = document.getElementById('skill-tree');
const stExpRateEl  = document.getElementById('st-exp-rate');
const stFruitsEl   = document.getElementById('st-fruits');
const stGridEl     = document.getElementById('st-skills-grid');
const resetConfirm = document.getElementById('reset-confirm');
document.getElementById('btn-yes').addEventListener('click', confirmReset);
document.getElementById('btn-no').addEventListener('click', cancelReset);

const DIRS = {
  ArrowUp:[0,-1], ArrowDown:[0,1], ArrowLeft:[-1,0], ArrowRight:[1,0],
  w:[0,-1], s:[0,1], a:[-1,0], d:[1,0],
  W:[0,-1], S:[0,1], A:[-1,0], D:[1,0],
};

let COLS, ROWS, CELL;
let snake, dir, nextDir, foods, maxFruits, powerup;
let score, exp, best, lives, level, state, interval;
let skills, fruitsSpent;
let skillTreeOpen = false;
let prevState = null;
let puBannerTimeout = null;

best = parseInt(localStorage.getItem('snakeBest') || '0');
bestEl.textContent = best;

function expPerFruit()     { return 1.0 + (skills.expBoost || 0) * 0.1; }
function spendableFruits() { return score - fruitsSpent; }
function skillCost(def) {
  if (def.id === 'expBoost')   return def.cost + (skills.expBoost   || 0) * 5;
  if (def.id === 'extraFruit') return def.cost + (skills.extraFruit || 0) * 10;
  return def.cost;
}

// ── Canvas sizing ──────────────────────────────────────────────────────────
function setGridSize(cols, rows) {
  COLS = cols; ROWS = rows; CELL = 20;
  canvas.width  = COLS * CELL;
  canvas.height = ROWS * CELL;
  const wrap = document.getElementById('canvas-wrap');
  wrap.style.width  = canvas.width  + 'px';
  wrap.style.height = canvas.height + 'px';
}

// ── Level helpers ──────────────────────────────────────────────────────────
function levelForExp(e) {
  let l = 1;
  for (let i = LEVEL_THRESHOLDS.length - 1; i >= 0; i--) {
    if (e >= LEVEL_THRESHOLDS[i]) { l = i + 1; break; }
  }
  return Math.min(l, LEVEL_THRESHOLDS.length);
}

function speedForLevel(l) { return Math.max(50, BASE_SPEED - (l - 1) * SPEED_STEP); }

function restartInterval() {
  clearInterval(interval);
  const base = speedForLevel(level);
  const ms   = Math.round(base * (1 + (skills.slowDown || 0) * 0.1));
  interval = setInterval(step, ms);
}

function fmtNum(n) {
  const s = n.toFixed(1);
  return s.endsWith('.0') ? String(Math.floor(n)) : s;
}

function updateLevelPanels() {
  const start = LEVEL_THRESHOLDS[level - 1];
  const end   = LEVEL_THRESHOLDS[level];
  eatenEl.textContent = fmtNum(exp - start);
  needEl.textContent  = end !== undefined ? fmtNum(Math.max(0, end - exp)) : '—';
  panelRightSub.textContent = end === undefined ? 'max\nlevel!' : 'to next\nlevel';
}

// ── Init ───────────────────────────────────────────────────────────────────
function init() {
  setGridSize(20, 20);
  snake       = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
  dir         = [1, 0];
  nextDir     = [1, 0];
  score       = 0;
  exp         = 0;
  lives       = 3;
  level       = 1;
  maxFruits   = 1;
  foods       = [];
  powerup     = null;
  skills      = { tongue: 0, expBoost: 0 };
  fruitsSpent = 0;
  scoreEl.textContent = 0;
  lvlEl.textContent   = 1;
  updateLivesHud();
  refillFoods();
  updateLevelPanels();
  draw();
}

function updateLivesHud() {
  livesEl.textContent = '♥'.repeat(Math.max(0, lives));
  livesEl.style.color = lives <= 1 ? '#ff4444' : '#e06c75';
}

// ── Food ───────────────────────────────────────────────────────────────────
function randomEmptyCell() {
  let pos, tries = 0;
  do {
    pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
    if (++tries > 500) break;
  } while (
    snake.some(s => s.x === pos.x && s.y === pos.y) ||
    foods.some(f => f.x === pos.x && f.y === pos.y) ||
    (powerup && powerup.x === pos.x && powerup.y === pos.y)
  );
  return pos;
}

function refillFoods() {
  while (foods.length < maxFruits) foods.push(randomEmptyCell());
}

// ── Core eat logic (called whenever any fruit is consumed) ─────────────────
function consumeFruit(grow) {
  score++;
  exp += expPerFruit();
  scoreEl.textContent = score;
  if (score > best) { best = score; bestEl.textContent = best; localStorage.setItem('snakeBest', best); }
  if (grow) snake.push({ ...snake[snake.length - 1] });
  checkLevelUp();
  refillFoods();
  maybeSpawnPowerup();
  if (skillTreeOpen) renderSkillTree(); // keep fruit count live
}

// ── Power-ups ──────────────────────────────────────────────────────────────
function maybeSpawnPowerup() {
  if (powerup || Math.random() > POWERUP_CHANCE) return;
  const type = POWERUP_POOL[Math.floor(Math.random() * POWERUP_POOL.length)];
  powerup = { ...randomEmptyCell(), type };
}

function applyPowerup(type) {
  const labels = {
    'extra-life':  { text: '♥ EXTRA LIFE', color: '#e06c75' },
    'extra-fruit': { text: '★ +1 FRUIT',   color: '#ffd700' },
    'bigger-map':  { text: '⊞ BIGGER MAP', color: '#61afef' },
  };
  showBanner(labels[type].text, labels[type].color);
  switch (type) {
    case 'extra-life': lives = Math.min(lives + 1, 5); updateLivesHud(); break;
    case 'extra-fruit': maxFruits++; refillFoods(); break;
    case 'bigger-map': growMap(); break;
  }
}

function growMap() {
  const nc = Math.min(COLS + 5, 40), nr = Math.min(ROWS + 5, 40);
  if (nc === COLS && nr === ROWS) { showBanner('MAP IS MAX SIZE', '#a0a0c0'); return; }
  setGridSize(nc, nr);
  refillFoods();
}

// ── Banner ─────────────────────────────────────────────────────────────────
function showBanner(text, color) {
  clearTimeout(puBannerTimeout);
  puBanner.textContent = text;
  puBanner.style.color = color;
  puBanner.style.background = color + '22';
  puBanner.classList.remove('hidden');
  puBannerTimeout = setTimeout(() => puBanner.classList.add('hidden'), 2200);
}

// ── Level up ───────────────────────────────────────────────────────────────
function checkLevelUp() {
  const newLevel = levelForExp(exp);
  if (newLevel > level) {
    level = newLevel;
    lvlEl.textContent = level;
    flashLevel();
    restartInterval();
    const type = POWERUP_POOL[Math.floor(Math.random() * POWERUP_POOL.length)];
    applyPowerup(type);
  }
  updateLevelPanels();
}

function flashLevel() {
  lvlFlash.textContent = `LEVEL ${level}`;
  lvlFlash.style.opacity = '1';
  setTimeout(() => lvlFlash.style.opacity = '0', 900);
}

// ── Game loop ──────────────────────────────────────────────────────────────
function step() {
  dir = nextDir;
  const head = { x: snake[0].x + dir[0], y: snake[0].y + dir[1] };

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS || snake.some(s => s.x === head.x && s.y === head.y)) {
    loseLife(); return;
  }

  snake.unshift(head);

  const foodIdx = foods.findIndex(f => f.x === head.x && f.y === head.y);
  if (foodIdx !== -1) {
    foods.splice(foodIdx, 1);
    consumeFruit(false); // snake already grew from unshift + no pop
  } else {
    snake.pop();
  }

  // tongue: eat food 1 cell further ahead
  if (skills.tongue > 0) {
    const tipX = head.x + dir[0];
    const tipY = head.y + dir[1];
    if (tipX >= 0 && tipX < COLS && tipY >= 0 && tipY < ROWS) {
      const tIdx = foods.findIndex(f => f.x === tipX && f.y === tipY);
      if (tIdx !== -1) {
        foods.splice(tIdx, 1);
        consumeFruit(true); // explicit grow since snake didn't naturally pass through tip
      }
    }
  }

  if (powerup && head.x === powerup.x && head.y === powerup.y) {
    const t = powerup.type; powerup = null; applyPowerup(t);
  }

  draw();
}

// ── Lives & death ──────────────────────────────────────────────────────────
function loseLife() {
  lives--;
  updateLivesHud();
  if (lives <= 0) {
    die();
  } else {
    snake   = [{ x: Math.floor(COLS/2), y: Math.floor(ROWS/2) },
               { x: Math.floor(COLS/2)-1, y: Math.floor(ROWS/2) },
               { x: Math.floor(COLS/2)-2, y: Math.floor(ROWS/2) }];
    dir = [1,0]; nextDir = [1,0]; powerup = null; foods = [];
    refillFoods();
    showBanner(`♥ ${lives} LIFE${lives!==1?'S':''} LEFT`, '#e06c75');
    draw();
  }
}

function die() {
  clearInterval(interval);
  if (skillTreeOpen) closeSkillTree(false);
  state = 'dead';
  overlayTitle.textContent = 'GAME OVER';
  overlayTitle.style.color = '#e06c75';
  overlayMsg.textContent   = `SCORE: ${score}  ·  LEVEL: ${level}  ·  PRESS SPACE TO RETRY`;
  overlay.classList.remove('hidden');
}

// ── Skill tree ─────────────────────────────────────────────────────────────
function openSkillTree() {
  if (state === 'dead' || state === 'idle') return;
  prevState = state;
  if (state === 'playing') clearInterval(interval);
  skillTreeOpen = true;
  overlay.classList.add('hidden');
  skillTreeEl.classList.remove('hidden');
  renderSkillTree();
}

function closeSkillTree(resume = true) {
  skillTreeOpen = false;
  skillTreeEl.classList.add('hidden');
  if (!resume) return;
  if (prevState === 'playing') {
    state = 'playing';
    restartInterval();
  } else {
    overlayTitle.textContent = 'PAUSED';
    overlayTitle.style.color = '#4ecca3';
    overlayMsg.textContent   = 'PRESS SPACE TO RESUME';
    overlay.classList.remove('hidden');
  }
}

function renderSkillTree() {
  stExpRateEl.textContent = `EXP/FRUIT: ${expPerFruit().toFixed(1)}`;
  stFruitsEl.textContent  = `FRUITS: ${spendableFruits()}`;

  stGridEl.innerHTML = '';
  SKILL_DEFS.forEach(def => {
    const lvl      = skills[def.id] || 0;
    const maxed    = lvl >= def.maxLevel;
    const cost     = skillCost(def);
    const afford   = spendableFruits() >= cost;
    const unlocked = !def.requires || (skills[def.requires.id] || 0) >= def.requires.level;

    const card = document.createElement('div');
    card.className = 'skill-card' + (lvl > 0 ? ' has-level' : '') + (unlocked ? '' : ' locked');

    const levelLine = def.maxLevel > 1
      ? `<div class="skill-lvl">LEVEL ${lvl} / ${def.maxLevel}</div>`
      : (lvl > 0 ? `<div class="skill-lvl">UNLOCKED</div>` : '');

    let btnHtml;
    if (!unlocked) {
      const req = def.requires;
      btnHtml = `<button class="skill-btn" disabled style="font-size:0.6rem;line-height:1.5">
        🔒<br><span style="color:#555577">${{expBoost:'+0.1 EXP', tongue:'TONGUE', extraFruit:'+1 FRUIT'}[req.id] ?? req.id} LVL ${req.level}</span>
      </button>`;
    } else if (maxed) {
      btnHtml = `<button class="skill-btn owned" disabled>${def.maxLevel > 1 ? 'MAX' : 'OWNED'}</button>`;
    } else {
      btnHtml = `<button class="skill-btn" data-id="${def.id}" ${afford ? '' : 'disabled'}>
        BUY<br><span class="skill-cost">${cost} fruits</span>
      </button>`;
    }

    card.innerHTML = `
      <div class="skill-icon" style="${unlocked ? '' : 'opacity:0.35'}">${def.icon}</div>
      <div class="skill-info" style="${unlocked ? '' : 'opacity:0.4'}">
        <div class="skill-name">${def.name}</div>
        <div class="skill-desc">${def.desc}</div>
        ${levelLine}
      </div>
      <div class="skill-action">${btnHtml}</div>
    `;
    stGridEl.appendChild(card);
  });

  stGridEl.querySelectorAll('.skill-btn[data-id]').forEach(btn => {
    btn.addEventListener('click', () => buySkill(btn.dataset.id));
  });
}

function buySkill(id) {
  const def = SKILL_DEFS.find(s => s.id === id);
  const cost = skillCost(def);
  if (!def || (skills[id] || 0) >= def.maxLevel || spendableFruits() < cost) return;
  if (def.requires && (skills[def.requires.id] || 0) < def.requires.level) return;
  fruitsSpent += cost;
  skills[id] = (skills[id] || 0) + 1;
  if (id === 'extraFruit') { maxFruits++; refillFoods(); }
  renderSkillTree();
}

// ── Draw ───────────────────────────────────────────────────────────────────
const POWERUP_COLORS = { 'extra-life':'#e06c75', 'extra-fruit':'#ffd700', 'bigger-map':'#61afef' };
const POWERUP_ICONS  = { 'extra-life':'♥',       'extra-fruit':'★',       'bigger-map':'⊞' };

function draw() {
  ctx.fillStyle = '#0f0f1e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#1e1e3a';
  for (let x = 0; x < COLS; x++)
    for (let y = 0; y < ROWS; y++)
      ctx.fillRect(x * CELL + 9, y * CELL + 9, 2, 2);

  foods.forEach(f => {
    ctx.fillStyle = '#e06c75';
    ctx.beginPath();
    ctx.arc(f.x * CELL + CELL/2, f.y * CELL + CELL/2, CELL/2 - 3, 0, Math.PI*2);
    ctx.fill();
  });

  if (powerup) {
    const px = powerup.x * CELL, py = powerup.y * CELL;
    const color = POWERUP_COLORS[powerup.type];
    ctx.save();
    ctx.shadowColor = color;
    ctx.shadowBlur  = 10 + 6 * Math.sin(Date.now() / 200);
    ctx.fillStyle   = color + 'cc';
    ctx.beginPath(); ctx.roundRect(px+2, py+2, CELL-4, CELL-4, 5); ctx.fill();
    ctx.restore();
    ctx.fillStyle = '#fff'; ctx.font = `${CELL-6}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(POWERUP_ICONS[powerup.type], px + CELL/2, py + CELL/2 + 1);
  }

  snake.forEach((seg, i) => {
    const t = i / (snake.length - 1 || 1);
    ctx.fillStyle = i === 0 ? '#4ecca3' : `hsl(${160 - t*40}, 70%, ${50 - t*15}%)`;
    const pad = i === 0 ? 1 : 2;
    ctx.beginPath();
    ctx.roundRect(seg.x * CELL + pad, seg.y * CELL + pad, CELL - pad*2, CELL - pad*2, 4);
    ctx.fill();
  });

  // tongue visual
  if (skills.tongue > 0 && snake.length > 0) {
    const h  = snake[0];
    const cx = h.x * CELL + CELL/2, cy = h.y * CELL + CELL/2;
    const ex = cx + dir[0] * CELL * 1.5, ey = cy + dir[1] * CELL * 1.5;
    const perp = [-dir[1], dir[0]]; // perpendicular
    const fLen = 5;
    ctx.strokeStyle = '#e06c75';
    ctx.lineWidth = 2; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(ex, ey); ctx.stroke();
    // fork
    ctx.beginPath();
    ctx.moveTo(ex, ey);
    ctx.lineTo(ex + dir[0]*fLen + perp[0]*fLen, ey + dir[1]*fLen + perp[1]*fLen);
    ctx.moveTo(ex, ey);
    ctx.lineTo(ex + dir[0]*fLen - perp[0]*fLen, ey + dir[1]*fLen - perp[1]*fLen);
    ctx.stroke();
  }
}

// ── Reset confirm ──────────────────────────────────────────────────────────
function showResetConfirm() {
  if (state === 'dead' || state === 'idle') return;
  if (skillTreeOpen) closeSkillTree(false);
  clearInterval(interval);
  overlay.classList.add('hidden');
  resetConfirm.classList.remove('hidden');
  state = 'confirm-reset';
}

function confirmReset() {
  resetConfirm.classList.add('hidden');
  init();
  state = 'idle';
  overlayTitle.textContent = 'READY';
  overlayTitle.style.color = '#e06c75';
  overlayMsg.textContent   = 'PRESS SPACE OR ENTER TO START';
  overlay.classList.remove('hidden');
}

function cancelReset() {
  resetConfirm.classList.add('hidden');
  state = 'paused';
  overlayTitle.textContent = 'PAUSED';
  overlayTitle.style.color = '#4ecca3';
  overlayMsg.textContent   = 'PRESS SPACE TO RESUME';
  overlay.classList.remove('hidden');
}

// ── Start / pause ──────────────────────────────────────────────────────────
function startGame() {
  overlay.classList.add('hidden');
  init();
  state = 'playing';
  restartInterval();
}

function togglePause() {
  if (skillTreeOpen) return;
  if (state === 'playing') {
    clearInterval(interval);
    state = 'paused';
    overlayTitle.textContent = 'PAUSED';
    overlayTitle.style.color = '#4ecca3';
    overlayMsg.textContent   = 'PRESS SPACE TO RESUME';
    overlay.classList.remove('hidden');
  } else if (state === 'paused') {
    overlay.classList.add('hidden');
    state = 'playing';
    restartInterval();
  }
}

// ── Input ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'r' || e.key === 'R') {
    if (state === 'playing' || state === 'paused') { showResetConfirm(); return; }
  }
  if (e.key === 'e' || e.key === 'E') {
    if (skillTreeOpen) { closeSkillTree(); return; }
    if (state === 'playing' || state === 'paused') { openSkillTree(); return; }
  }
  if (e.key === 'Escape' && skillTreeOpen) { closeSkillTree(); return; }
  if (e.key === 'Escape' && state === 'confirm-reset') { cancelReset(); return; }
  if ((e.key === ' ' || e.key === 'Enter') && (state === 'idle' || state === 'dead')) {
    startGame(); return;
  }
  if (e.key === ' ' && (state === 'playing' || state === 'paused')) {
    togglePause(); return;
  }
  if (state !== 'playing' || skillTreeOpen || state === 'confirm-reset') return;
  const d = DIRS[e.key];
  if (!d) return;
  e.preventDefault();
  if (d[0] === -dir[0] && d[1] === -dir[1]) return;
  nextDir = d;
});

let tx, ty;
canvas.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, { passive: true });
canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx, dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
  if (state === 'idle' || state === 'dead') { startGame(); return; }
  if (Math.abs(dx) > Math.abs(dy)) nextDir = dx > 0 ? [1,0] : [-1,0];
  else nextDir = dy > 0 ? [0,1] : [0,-1];
  if (nextDir[0] === -dir[0] && nextDir[1] === -dir[1]) nextDir = dir;
}, { passive: true });

// ── Boot ───────────────────────────────────────────────────────────────────
state = 'idle';
setGridSize(20, 20);
init();

function animLoop() { if ((state === 'playing' || skillTreeOpen) && powerup) draw(); requestAnimationFrame(animLoop); }
animLoop();
</script>
